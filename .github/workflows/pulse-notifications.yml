name: Pulse Notifications

on:
  workflow_dispatch:

jobs:

  notify:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run notification script
        run: node scripts/sendNotifications.js
