<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Configurações - Retropixel Pulse™</title>

<link rel="icon" type="image/png" href="assets/Pulse_icon.png">

<link rel="stylesheet" href="css/style.css">

</head>
<body>

<div class="background"></div>

<header class="topbar">

    <div class="logo-area">

        <img
        src="assets/Pulse_logo.png"
        class="logo"
        alt="Logo">

        <div>
            <h1>Retropixel Pulse™</h1>
            <p>Configurações</p>
        </div>

    </div>

    <nav class="navbar">

        <a href="feed.html">📰 Feed</a>

        <a href="history.html">🕘 Histórico</a>

        <a href="settings.html">
            ⚙️ Configurações
        </a>

    </nav>

</header>

<main class="setup-container">

<div class="setup-card">

<h2>⚙️ Configurações</h2>

<section>

<h3>🌎 Idioma</h3>

<select id="language">

<option value="pt-BR">
Português
</option>

<option value="en-US">
English
</option>

<option value="es-ES">
Español
</option>

</select>

</section>

<section>

<h3>⏰ Horário</h3>

<input
type="time"
id="notificationTime">

</section>

<section>

<h3>🔔 Notificações</h3>

<button
id="enableNotifications"
class="primary-btn">

Ativar Notificações

</button>

<button
id="disableNotifications"
class="primary-btn">

Desativar Notificações

</button>

</section>

<section>

<h3>🧹 Dados</h3>

<button
id="clearHistory"
class="primary-btn">

Limpar Histórico

</button>

<button
id="resetPreferences"
class="primary-btn">

Resetar Preferências

</button>

</section>

<section>

<button
id="saveSettings"
class="continue-btn">

💾 Salvar Configurações

</button>

</section>

</div>

</main>

<script src="js/settings.js"></script>

</body>
</html>
